<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bangu 2030">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Bangu 2030 | Gestão de Bares</title>
<style>
/* ============ BANGU 2030 – DESIGN SYSTEM ============ */
:root{
  --red:#C8102E; --red-dark:#9E0C24; --red-darker:#7A0A1C; --red-light:#FDECEF; --red-mid:#F5C2CB;
  --bg:#F4F5F7; --surface:#FFFFFF; --surface2:#FAFAFB;
  --text:#1A1D21; --text2:#5F6673; --text3:#9AA1AC;
  --line:#E6E8EC; --line2:#F0F1F4;
  --green:#0E9F5D; --green-bg:#E7F7EF; --amber:#B77800; --amber-bg:#FFF4DC;
  --blue:#1D6FD8; --blue-bg:#E9F1FC; --purple:#7A4FD8; --purple-bg:#F1EBFC;
  --shadow:0 1px 3px rgba(16,20,28,.06),0 6px 18px rgba(16,20,28,.06);
  --shadow-lg:0 8px 30px rgba(16,20,28,.14);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#101216; --surface:#1A1D23; --surface2:#22262E;
  --text:#F2F3F5; --text2:#A8AFBA; --text3:#6E7581;
  --line:#2B303A; --line2:#242832;
  --red-light:#3A1520; --red-mid:#5A1D2C;
  --green-bg:#12301F; --amber-bg:#33290F; --blue-bg:#14263C; --purple-bg:#251B3D;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.35);
  --shadow-lg:0 8px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Segoe UI',system-ui,-apple-system,'Inter',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior-y:none;transition:background .25s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--text);background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
label{font-size:.8rem;font-weight:600;color:var(--text2);display:block;margin:12px 0 5px}
h1,h2,h3{line-height:1.2}
::placeholder{color:var(--text3)}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#loginScreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:linear-gradient(160deg,var(--red) 0%,var(--red-dark) 55%,var(--red-darker) 100%);overflow-y:auto}
.login-hero{padding:56px 24px 28px;text-align:center;color:#fff}
.login-logo{width:84px;height:84px;border-radius:24px;background:#fff;color:var(--red);display:inline-flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:16px}
.login-hero h1{font-size:1.7rem;font-weight:800;letter-spacing:-.02em}
.login-hero p{opacity:.85;margin-top:4px;font-size:.95rem}
.login-card{background:var(--surface);border-radius:28px 28px 0 0;flex:1;padding:28px 22px calc(40px + var(--safe-b));box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.login-card h2{font-size:1.05rem;color:var(--text2);font-weight:600;margin-bottom:14px}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;max-width:680px;margin:0 auto}
.user-card{background:var(--surface2);border:1.5px solid var(--line);border-radius:var(--r);padding:16px 12px;text-align:center;transition:.15s}
.user-card:active{transform:scale(.96)}
.user-card.sel{border-color:var(--red);background:var(--red-light)}
.user-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;font-weight:700}
.user-card b{display:block;font-size:.92rem}
.user-card span{font-size:.74rem;color:var(--text2)}
.pin-wrap{max-width:340px;margin:0 auto;text-align:center}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:18px 0 22px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--text3);transition:.15s}
.pin-dot.on{background:var(--red);border-color:var(--red)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.numpad button{height:64px;border-radius:var(--r);background:var(--surface2);border:1.5px solid var(--line);font-size:1.5rem;font-weight:600;transition:.1s}
.numpad button:active{background:var(--red-light);transform:scale(.95)}
.link-btn{color:var(--red);font-weight:600;font-size:.9rem;padding:10px}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{display:none;width:248px;background:var(--surface);border-right:1px solid var(--line);flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:20px 18px;border-bottom:1px solid var(--line2)}
.brand-badge{width:40px;height:40px;border-radius:12px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem}
.sidebar .brand b{font-size:1rem}
.sidebar .brand span{display:block;font-size:.72rem;color:var(--text2)}
.nav-list{flex:1;overflow-y:auto;padding:10px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border-radius:var(--r-sm);font-size:.92rem;font-weight:500;color:var(--text2);margin-bottom:2px;text-align:left}
.nav-item .ic{font-size:1.15rem;width:26px;text-align:center}
.nav-item.on{background:var(--red-light);color:var(--red);font-weight:700}
.nav-item:hover{background:var(--surface2)}
.nav-item.on:hover{background:var(--red-light)}
.sidebar-foot{padding:14px;border-top:1px solid var(--line2);font-size:.8rem;color:var(--text2)}
.main{flex:1;min-width:0;padding-bottom:calc(84px + var(--safe-b))}
@media(min-width:1024px){.sidebar{display:flex}.main{margin-left:248px;padding-bottom:30px}.bottombar{display:none!important}}

/* topbar */
.topbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 16px;backdrop-filter:blur(8px)}
.topbar h1{font-size:1.15rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:42px;height:42px;min-width:42px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.15rem;position:relative}
.icon-btn:active{transform:scale(.93)}
.icon-btn .bdg{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sync-dot{width:9px;height:9px;border-radius:50%;position:absolute;bottom:6px;right:6px;background:var(--text3)}
.sync-dot.on{background:var(--green)}.sync-dot.err{background:var(--amber)}
.chip-user{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--line);border-radius:22px;padding:5px 12px 5px 5px}
.chip-user .user-avatar{width:32px;height:32px;font-size:.9rem;margin:0}
.chip-user b{font-size:.82rem}
.chip-user span{display:block;font-size:.68rem;color:var(--text2)}

/* bottom nav (mobile) */
.bottombar{position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + var(--safe-b))}
.bottombar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;font-size:.62rem;font-weight:600;color:var(--text3);border-radius:10px}
.bottombar button .ic{font-size:1.35rem}
.bottombar button.on{color:var(--red)}

/* ---------- COMPONENTS ---------- */
.page{padding:16px;max-width:1180px;margin:0 auto;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.page-head h2{font-size:1.3rem;font-weight:800;letter-spacing:-.01em}
.page-head p{color:var(--text2);font-size:.85rem;margin-top:2px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h3{font-size:1rem;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.grid3{grid-template-columns:1fr 1fr}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:#fff;font-weight:700;font-size:.95rem;border-radius:var(--r-sm);padding:13px 20px;transition:.12s;min-height:48px}
.btn:active{transform:scale(.97)}
.btn.big{width:100%;font-size:1.05rem;min-height:56px;border-radius:var(--r)}
.btn.ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--line)}
.btn.soft{background:var(--red-light);color:var(--red)}
.btn.green{background:var(--green)}
.btn.blue{background:var(--blue)}
.btn.sm{min-height:38px;padding:8px 14px;font-size:.83rem;border-radius:9px}
.btn:disabled{opacity:.45;pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-light);color:var(--red)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--line2);color:var(--text2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row .sbox{flex:1;position:relative}
.search-row .sbox input{padding-left:40px}
.search-row .sbox .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3)}
.tabs{display:flex;gap:6px;background:var(--surface2);border:1px solid var(--line);padding:4px;border-radius:12px;margin-bottom:14px;overflow-x:auto}
.tabs button{flex:1;padding:10px 14px;border-radius:9px;font-weight:600;font-size:.85rem;color:var(--text2);white-space:nowrap}
.tabs button.on{background:var(--surface);color:var(--red);box-shadow:var(--shadow);font-weight:700}
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{background:var(--surface2);text-align:left;padding:11px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--line2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{padding:44px 20px;text-align:center;color:var(--text2)}
.empty .ic{font-size:2.6rem;display:block;margin-bottom:10px}
.list-row{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line2)}
.list-row:last-child{border-bottom:none}
.prod-thumb{width:46px;height:46px;min-width:46px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);display:flex;align-items:center;gap:6px}
.kpi .val{font-size:1.45rem;font-weight:800;margin-top:6px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:.72rem;color:var(--text2);margin-top:3px}
.kpi.hl{background:var(--red);border-color:var(--red);color:#fff}
.kpi.hl .lbl,.kpi.hl .sub{color:rgba(255,255,255,.8)}

/* barras de gráfico */
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:.84rem}
.hbar-row .nm{width:120px;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.hbar-track{flex:1;height:22px;background:var(--line2);border-radius:7px;overflow:hidden}
.hbar-fill{height:100%;border-radius:7px;background:var(--red);display:flex;align-items:center;transition:width .5s}
.hbar-row .vl{width:88px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:.8rem}

/* ---------- PDV ---------- */
.pos-wrap{display:grid;grid-template-columns:1fr 340px;gap:14px}
@media(max-width:900px){.pos-wrap{grid-template-columns:1fr}}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
.pos-item{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:12px 10px;text-align:center;box-shadow:var(--shadow);transition:.1s;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.pos-item:active{transform:scale(.94);border-color:var(--red)}
.pos-item .em{font-size:2rem}
.pos-item b{font-size:.84rem;line-height:1.15}
.pos-item .pr{color:var(--red);font-weight:800;font-size:.92rem}
.pos-item .st{position:absolute;top:7px;right:8px;font-size:.62rem;font-weight:700;color:var(--text3)}
.pos-item.low .st{color:var(--amber)}
.pos-item.out{opacity:.4;pointer-events:none}
.cart{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:calc(100vh - 210px);position:sticky;top:76px}
@media(max-width:900px){.cart{position:fixed;left:0;right:0;bottom:0;top:auto;max-height:76vh;z-index:60;border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);transform:translateY(calc(100% - 74px - var(--safe-b)));transition:transform .25s}
.cart.open{transform:none}}
.cart-head{padding:14px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between}
.cart-body{flex:1;overflow-y:auto;padding:6px 16px}
.cart-line{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line2)}
.cart-line b{flex:1;font-size:.88rem}
.qty-ctl{display:flex;align-items:center;gap:2px}
.qty-ctl button{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);font-size:1.15rem;font-weight:700}
.qty-ctl span{width:34px;text-align:center;font-weight:800;font-size:1rem}
.cart-foot{padding:14px 16px calc(14px + var(--safe-b));border-top:1px solid var(--line2)}
.pay-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.pay-row button{padding:13px 6px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--surface2);font-weight:700;font-size:.86rem;display:flex;flex-direction:column;align-items:center;gap:3px}
.pay-row button .ic{font-size:1.25rem}
.pay-row button.on{border-color:var(--red);background:var(--red-light);color:var(--red)}
.total-line{display:flex;justify-content:space-between;align-items:baseline;font-weight:800;font-size:1.25rem}
.total-line small{color:var(--text2);font-weight:600;font-size:.8rem}

/* ---------- MODAL / SHEET ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(10,12,16,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s;backdrop-filter:blur(2px)}
@media(min-width:640px){.modal-bg{align-items:center;padding:20px}}
.modal{background:var(--surface);width:100%;max-width:560px;max-height:92vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;animation:slideUp .22s}
@media(min-width:640px){.modal{border-radius:var(--r-lg)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:1.05rem}
.modal-body{padding:4px 20px 16px;overflow-y:auto}
.modal-foot{padding:14px 20px calc(14px + var(--safe-b));border-top:1px solid var(--line2);display:flex;gap:10px}
.modal-foot .btn{flex:1}
.x-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);font-size:1rem}

/* assinatura */
.sig-pad{border:2px dashed var(--line);border-radius:var(--r);background:var(--surface2);width:100%;height:170px;touch-action:none}
.sig-img{max-height:56px;border:1px solid var(--line);border-radius:8px;background:#fff}

/* toast */
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;width:min(94vw,420px)}
.toast{background:var(--text);color:var(--bg);padding:13px 18px;border-radius:12px;font-weight:600;font-size:.9rem;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:center;animation:slideDown .25s}
.toast.ok{background:var(--green);color:#fff}.toast.err{background:var(--red);color:#fff}.toast.warn{background:var(--amber);color:#fff}
@keyframes slideDown{from{transform:translateY(-16px);opacity:0}to{transform:none;opacity:1}}

/* impressão */
#printArea{display:none}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;color:#000}
  #printArea .ph{display:flex;justify-content:space-between;border-bottom:3px solid #C8102E;padding-bottom:10px;margin-bottom:14px}
  #printArea h1{font-size:18pt;color:#C8102E}
  #printArea table{width:100%;border-collapse:collapse;font-size:9.5pt;margin:8px 0}
  #printArea th,#printArea td{border:1px solid #999;padding:5px 7px;text-align:left}
  #printArea th{background:#eee}
  #printArea .sig-line{margin-top:36px;display:flex;gap:40px}
  #printArea .sig-line div{flex:1;border-top:1px solid #000;padding-top:5px;text-align:center;font-size:9pt}
}
</style>
</head>
<body>
<!-- ======== LOGIN ======== -->
<div id="loginScreen">
  <div class="login-hero">
    <div class="login-logo">B</div>
    <h1>Bangu 2030</h1>
    <p>Gestão de Bares · Estádio Moça Bonita</p>
  </div>
  <div class="login-card" id="loginCard"></div>
</div>

<!-- ======== APP ======== -->
<div id="app">
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div id="view"></div>
    </div>
  </div>
  <nav class="bottombar" id="bottombar"></nav>
</div>

<div id="modalRoot"></div>
<div id="toasts"></div>
<div id="printArea"></div>

<script>
/* =====================================================
   BANGU 2030 · Gestão de Bares — núcleo do aplicativo
   Arquitetura: SPA offline-first + sincronização opcional
   ===================================================== */
'use strict';

/* ---------- utilidades ---------- */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const BRL=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const NUM=v=>(v||0).toLocaleString('pt-BR');
const PCT=v=>(isFinite(v)?(v*100).toFixed(1).replace('.',','):'—')+'%';
const dtBR=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
const dBR=iso=>{if(!iso)return'—';const [y,m,d]=iso.slice(0,10).split('-');return `${d}/${m}/${y}`};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const debounce=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};

/* armazenamento seguro (funciona mesmo sem localStorage) */
const mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return mem[k]??null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}},
};

/* ---------- constantes de domínio ---------- */

/* ---------- cálculo de estoque por bar (derivado — à prova de sincronização) ---------- */
function estoqueBar(bar,jogoId){
  const e={};
  const add=(pid,q)=>{e[pid]=(e[pid]||0)+q};
  db.romaneios.filter(r=>r.bar===bar&&(!jogoId||r.jogoId===jogoId)&&r.status==='recebido').forEach(r=>r.itens.forEach(i=>add(i.produtoId,+i.qtdRecebida||0)));
  db.reposicoes.filter(r=>r.bar===bar&&(!jogoId||r.jogoId===jogoId)&&r.status==='entregue').forEach(r=>r.itens.forEach(i=>add(i.produtoId,-0+ +i.qtd||0)));
  db.vendas.filter(v=>v.bar===bar&&(!jogoId||v.jogoId===jogoId)).forEach(v=>v.itens.forEach(i=>add(i.produtoId,-i.qtd)));
  db.devolucoes.filter(d=>d.bar===bar&&(!jogoId||d.jogoId===jogoId)).forEach(d=>d.itens.forEach(i=>add(i.produtoId,-((+i.qtdDevolvida||0)+(+i.qtdPerdida||0)+(+i.qtdDanificada||0)))));
  return e;
}

/* ---------- assinatura digital ---------- */
const SigPad={
  canvas:null,ctx:null,tem:false,
  montar(id){
    this.canvas=$('#'+id);if(!this.canvas)return;
    const c=this.canvas;c.width=c.offsetWidth*2;c.height=c.offsetHeight*2;
    this.ctx=c.getContext('2d');this.ctx.scale(2,2);
    this.ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--text')||'#000';
    this.ctx.lineWidth=2.4;this.ctx.lineCap='round';this.ctx.lineJoin='round';this.tem=false;
    let des=false,px=0,py=0;
    const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]};
    const ini=e=>{des=true;[px,py]=pos(e);e.preventDefault()};
    const mov=e=>{if(!des)return;const[x,y]=pos(e);this.ctx.beginPath();this.ctx.moveTo(px,py);this.ctx.lineTo(x,y);this.ctx.stroke();[px,py]=[x,y];this.tem=true;e.preventDefault()};
    const fim=()=>des=false;
    c.addEventListener('mousedown',ini);c.addEventListener('mousemove',mov);window.addEventListener('mouseup',fim);
    c.addEventListener('touchstart',ini,{passive:false});c.addEventListener('touchmove',mov,{passive:false});c.addEventListener('touchend',fim);
  },
  limpar(){if(this.ctx){this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);this.tem=false}},
  dataURL(){return this.tem?this.canvas.toDataURL('image/png'):null}
};
function sigHTML(){return `<label>Assinatura digital do responsável *</label>
  <canvas id="sigCanvas" class="sig-pad"></canvas>
  <button class="link-btn" onclick="SigPad.limpar()">↺ Limpar assinatura</button>`}

function statsJogo(jogoId){
  const vendas=db.vendas.filter(v=>!jogoId||v.jogoId===jogoId);
  const receita=vendas.reduce((s,v)=>s+v.total,0);
  const custo=vendas.reduce((s,v)=>s+v.itens.reduce((c,i)=>{const p=prod(i.produtoId);return c+(p?p.custo*i.qtd:0)},0),0);
  const itens=vendas.reduce((s,v)=>s+v.itens.reduce((c,i)=>c+i.qtd,0),0);
  const porPgto={pix:0,dinheiro:0,cartao:0};
  vendas.forEach(v=>porPgto[v.pagamento]+=v.total);
  const porBar={social:0,bangu:0,visitante:0};
  vendas.forEach(v=>porBar[v.bar]+=v.total);
  const porProduto={};
  vendas.forEach(v=>v.itens.forEach(i=>{porProduto[i.produtoId]=porProduto[i.produtoId]||{qtd:0,valor:0};porProduto[i.produtoId].qtd+=i.qtd;porProduto[i.produtoId].valor+=i.qtd*i.preco}));
  const perdas=db.devolucoes.filter(d=>!jogoId||d.jogoId===jogoId).reduce((s,d)=>s+d.itens.reduce((c,i)=>{const p=prod(i.produtoId);return c+(p?p.custo*((+i.qtdPerdida||0)+(+i.qtdDanificada||0)):0)},0),0);
  /* venda por minuto: janela desde a 1ª venda */
  let vpm=0;
  if(vendas.length>1){
    const ts=vendas.map(v=>new Date(v.updatedAt).getTime());
    const min=Math.max(1,(Math.max(...ts)-Math.min(...ts))/60000);
    vpm=receita/min;
  }
  return {vendas,receita,custo,lucro:receita-custo,itens,porPgto,porBar,porProduto,perdas,vpm,
    ticket:vendas.length?receita/vendas.length:0,cmv:receita?custo/receita:0,margem:receita?(receita-custo)/receita:0};
}

  render(){
    const busca=(rotaParams.busca||'').toLowerCase();
    let lista=db.produtos.filter(p=>!filtroProdCat||p.categoria===filtroProdCat);
    if(busca)lista=lista.filter(p=>p.nome.toLowerCase().includes(busca)||p.codigo.toLowerCase().includes(busca)||(p.barras||'').includes(busca));
    return `
    <div class="page-head"><div><h2>Catálogo de produtos</h2><p>${db.produtos.length} cadastrados · ${db.produtos.filter(p=>p.ativo).length} ativos</p></div>
      <button class="btn" onclick="formProduto()">＋ Novo produto</button></div>
    <div class="search-row">
      <div class="sbox"><span class="ic">🔎</span><input id="buscaProd" placeholder="Buscar por nome, código ou código de barras…" value="${esc(rotaParams.busca||'')}" oninput="buscaProduto(this.value)"></div>
      <button class="icon-btn" title="Busca por voz" onclick="buscaVoz(v=>{$('#buscaProd').value=v;buscaProduto(v)})">🎤</button>
    </div>
    <div class="tabs"><button class="${!filtroProdCat?'on':''}" onclick="filtroProdCat='';navegar('produtos')">Todas</button>
      ${CATEGORIAS.map(c=>`<button class="${filtroProdCat===c?'on':''}" onclick="filtroProdCat='${c}';navegar('produtos')">${CAT_EMOJI[c]} ${c}</button>`).join('')}</div>
    <div class="card" style="padding:6px 16px">
      ${lista.length?lista.map(p=>{
        const margem=p.preco?((p.preco-p.custo)/p.preco):0;
        const baixo=p.estoqueCentral<=p.estoqueMin;
        return `<div class="list-row" onclick="formProduto('${p.id}')" style="cursor:pointer">
          <div class="prod-thumb">${p.foto?`<img src="${p.foto}">`:(CAT_EMOJI[p.categoria]||'📦')}</div>
          <div style="flex:1;min-width:0"><b style="font-size:.95rem">${esc(p.nome)}</b>${p.ativo?'':' <span class="badge b-gray">inativo</span>'}
            <div style="font-size:.76rem;color:var(--text2)">${esc(p.codigo)} · ${esc(p.categoria)}${p.fornecedor?' · '+esc(p.fornecedor):''} · margem ${PCT(margem)}</div></div>
          <div style="text-align:right"><b style="color:var(--red)">${BRL(p.preco)}</b>
            <div style="font-size:.74rem"><span class="badge ${baixo?'b-amber':'b-green'}">${NUM(p.estoqueCentral)} ${esc(p.unidade)}</span></div></div>
        </div>`}).join(''):'<div class="empty"><span class="ic">🏷️</span>Nenhum produto encontrado</div>'}
    </div>`;
  }
};
const buscaProduto=debounce(v=>{rotaParams.busca=v;const el=$('#buscaProd');navegar('produtos',rotaParams);const n=$('#buscaProd');n.focus();n.setSelectionRange(n.value.length,n.value.length)},350);

function formProduto(id){
  const p=id?prod(id):null;
  abrirModal(p?'Editar produto':'Novo produto',`
    <div class="grid2"><div><label>Código *</label><input id="f_cod" value="${esc(p?.codigo||'')}" placeholder="EX: CER02"></div>
    <div><label>Código de barras</label><input id="f_bar" value="${esc(p?.barras||'')}" placeholder="789…" inputmode="numeric"></div></div>
    <label>Nome *</label><input id="f_nome" value="${esc(p?.nome||'')}" placeholder="Nome do produto">
    <div class="grid2"><div><label>Categoria</label><select id="f_cat">${CATEGORIAS.map(c=>`<option ${p?.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div><label>Fornecedor</label><input id="f_forn" value="${esc(p?.fornecedor||'')}"></div></div>
    <div class="grid3"><div><label>Custo (R$)</label><input id="f_custo" type="number" step="0.01" value="${p?p.custo:''}"></div>
    <div><label>Preço venda (R$)</label><input id="f_preco" type="number" step="0.01" value="${p?p.preco:''}"></div>
    <div><label>Margem</label><input id="f_margem" disabled value="—"></div></div>
    <div class="grid3"><div><label>Estoque mínimo</label><input id="f_min" type="number" value="${p?p.estoqueMin:'0'}"></div>
    <div><label>Estoque atual</label><input id="f_atual" type="number" value="${p?p.estoqueCentral:'0'}"></div>
    <div><label>Unidade</label><input id="f_un" value="${esc(p?.unidade||'un')}"></div></div>
    <label>Foto</label><input id="f_foto" type="file" accept="image/*" style="padding:9px">
    <label style="display:flex;align-items:center;gap:8px;margin-top:14px"><input type="checkbox" id="f_ativo" style="width:20px;height:20px" ${!p||p.ativo?'checked':''}> Produto ativo</label>
  `,`
    ${p?`<button class="btn ghost" onclick="excluirProduto('${p.id}')">🗑️</button>`:''}
    <button class="btn" onclick="salvarProduto('${p?p.id:''}')">Salvar</button>`);
  const calc=()=>{const c=+$('#f_custo').value||0,v=+$('#f_preco').value||0;$('#f_margem').value=v?PCT((v-c)/v):'—'};
  $('#f_custo').oninput=calc;$('#f_preco').oninput=calc;calc();
}
function salvarProduto(id){
  const nome=$('#f_nome').value.trim(),cod=$('#f_cod').value.trim();
  if(!nome||!cod)return toast('Preencha código e nome','warn');
  const fim=(foto)=>{
    if(id){const p=prod(id);Object.assign(p,{codigo:cod,barras:$('#f_bar').value.trim(),nome,categoria:$('#f_cat').value,fornecedor:$('#f_forn').value.trim(),custo:+$('#f_custo').value||0,preco:+$('#f_preco').value||0,estoqueMin:+$('#f_min').value||0,estoqueCentral:+$('#f_atual').value||0,unidade:$('#f_un').value.trim()||'un',ativo:$('#f_ativo').checked,updatedAt:now()});if(foto!==undefined)p.foto=foto;audit('produto.editar',nome);}
    else{db.produtos.push({id:'p-'+uid(),codigo:cod,barras:$('#f_bar').value.trim(),nome,categoria:$('#f_cat').value,fornecedor:$('#f_forn').value.trim(),custo:+$('#f_custo').value||0,preco:+$('#f_preco').value||0,estoqueMin:+$('#f_min').value||0,estoqueCentral:+$('#f_atual').value||0,unidade:$('#f_un').value.trim()||'un',foto:foto||'',ativo:$('#f_ativo').checked,updatedAt:now()});audit('produto.criar',nome);}
    salvar();fecharModal();toast('Produto salvo','ok');navegar('produtos');
  };
  const f=$('#f_foto').files[0];
  if(f){const img=new Image();const rd=new FileReader();
    rd.onload=()=>{img.onload=()=>{const cv=document.createElement('canvas');const m=Math.min(1,320/Math.max(img.width,img.height));cv.width=img.width*m;cv.height=img.height*m;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);fim(cv.toDataURL('image/jpeg',.75))};img.src=rd.result};
    rd.readAsDataURL(f);
  }else fim(undefined);
}
function excluirProduto(id){
  const p=prod(id);
  if(!confirm(`Excluir "${p.nome}"? O histórico de vendas será mantido.`))return;
  db.excluidos.push({tipo:'produtos',id,quando:now()});
  db.produtos=db.produtos.filter(x=>x.id!==id);
  audit('produto.excluir',p.nome);salvar();fecharModal();toast('Produto excluído');navegar('produtos');
}

let abaEstoque='central';
TELAS.estoque={titulo:'Estoque',
  render(){
    const j=jogoAtivo();
    const abas=[['central','🏬 Central'],['social','🥂 Social'],['bangu','🔴 Bangu'],['visitante','🚌 Visitante']];

      corpo=`<div class="table-wrap"><table><thead><tr><th>Produto</th><th class="num">Mínimo</th><th class="num">Atual</th><th>Situação</th>${sessao.perfil!=='caixa'?'<th></th>':''}</tr></thead><tbody>
      ${db.produtos.filter(p=>p.ativo).map(p=>{
        const baixo=p.estoqueCentral<=p.estoqueMin;
        return `<tr><td><b>${esc(p.nome)}</b><div style="font-size:.72rem;color:var(--text2)">${esc(p.codigo)}</div></td>
        <td class="num">${NUM(p.estoqueMin)}</td><td class="num"><b>${NUM(p.estoqueCentral)}</b> ${esc(p.unidade)}</td>
        <td><span class="badge ${p.estoqueCentral<=0?'b-red':baixo?'b-amber':'b-green'}">${p.estoqueCentral<=0?'Zerado':baixo?'Repor':'OK'}</span></td>
        ${sessao.perfil!=='caixa'?`<td><button class="btn ghost sm" onclick="ajusteEstoque('${p.id}')">Ajustar</button></td>`:''}</tr>`}).join('')}
      </tbody></table></div>`;
    }else{
      const e=estoqueBar(abaEstoque,j?j.id:null);
      const linhas=db.produtos.filter(p=>p.ativo&&(e[p.id]!==undefined)).map(p=>`<tr><td><b>${esc(p.nome)}</b></td><td class="num"><b>${NUM(e[p.id]||0)}</b> ${esc(p.unidade)}</td>
        <td><span class="badge ${e[p.id]<=0?'b-red':e[p.id]<=5?'b-amber':'b-green'}">${e[p.id]<=0?'Zerado':e[p.id]<=5?'Baixo':'OK'}</span></td></tr>`).join('');
      corpo=linhas?`<div class="table-wrap"><table><thead><tr><th>Produto</th><th class="num">Disponível ${j?'(jogo atual)':''}</th><th>Situação</th></tr></thead><tbody>${linhas}</tbody></table></div>`
        :`<div class="card"><div class="empty"><span class="ic">📦</span>Nenhuma carga recebida ${j?'neste jogo':''} para este bar.<br><small>Gere e receba um romaneio para abastecer.</small></div></div>`;

      <button class="btn ghost sm" onclick="exportEstoqueCSV()">⬇ Excel</button></div>
    <div class="tabs">${abas.map(([k,n])=>`<button class="${abaEstoque===k?'on':''}" onclick="abaEstoque='${k}';navegar('estoque')">${n}</button>`).join('')}</div>${corpo}`;
  }
};
function ajusteEstoque(pid){
  const p=prod(pid);
  abrirModal('Ajustar estoque · '+esc(p.nome),`
    <p style="color:var(--text2);font-size:.85rem">Estoque atual: <b>${NUM(p.estoqueCentral)} ${esc(p.unidade)}</b></p>
    <label>Novo valor</label><input id="aj_val" type="number" value="${p.estoqueCentral}">
    <label>Motivo do ajuste *</label><input id="aj_mot" placeholder="Ex.: contagem de inventário">`,
    `<button class="btn" onclick="salvarAjuste('${pid}')">Confirmar ajuste</button>`);
}
function salvarAjuste(pid){
  const p=prod(pid);const nv=+$('#aj_val').value||0;const mot=$('#aj_mot').value.trim();
  if(!mot)return toast('Informe o motivo','warn');
  db.ajustes.push({id:uid(),produtoId:pid,de:p.estoqueCentral,para:nv,motivo:mot,quem:sessao.nome,updatedAt:now()});
  audit('estoque.ajuste',`${p.nome}: ${p.estoqueCentral} → ${nv} (${mot})`);
  p.estoqueCentral=nv;p.updatedAt=now();salvar();fecharModal();toast('Estoque ajustado','ok');navegar('estoque');
}
function exportEstoqueCSV(){
  const rows=[['Codigo','Produto','Categoria','Custo','Preco','Minimo','Central','Social','Bangu','Visitante']];
  const es=estoqueBar('social'),eb=estoqueBar('bangu'),ev=estoqueBar('visitante');
  db.produtos.forEach(p=>rows.push([p.codigo,p.nome,p.categoria,p.custo,p.preco,p.estoqueMin,p.estoqueCentral,es[p.id]||0,eb[p.id]||0,ev[p.id]||0]));
  baixarCSV('estoque_bangu2030.csv',rows);
}

TELAS.compras={titulo:'Compras',
  render(){
    return `<div class="page-head"><div><h2>Entradas de mercadoria</h2><p>${db.compras.length} lançamentos</p></div>
      <button class="btn" onclick="formCompra()">＋ Lançar compra</button></div>
    <div class="card" style="padding:6px 16px">
    ${db.compras.length?[...db.compras].reverse().map(c=>`
      <div class="list-row"><div class="prod-thumb">🧾</div>
        <div style="flex:1"><b>${esc(c.fornecedor)}</b><div style="font-size:.76rem;color:var(--text2)">NF ${esc(c.nf||'—')} · ${dBR(c.data)} · ${c.itens.length} itens · por ${esc(c.responsavel)}</div></div>
        <b style="color:var(--red)">${BRL(c.valor)}</b></div>`).join(''):'<div class="empty"><span class="ic">🧾</span>Nenhuma compra lançada</div>'}
    </div>`;
  }
};
let compraItens=[];
function formCompra(){
  compraItens=[];
  abrirModal('Lançar compra',`
    <div class="grid2"><div><label>Fornecedor *</label><input id="c_forn" placeholder="Nome do fornecedor"></div>
    <div><label>Data</label><input id="c_data" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div>
    <label>Nota fiscal</label><input id="c_nf" placeholder="Número da NF">
    <div style="background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:14px">
      <b style="font-size:.9rem">Itens da compra</b>
      <div style="display:flex;gap:8px;margin-top:8px">
        <select id="c_prod" style="flex:2">${db.produtos.filter(p=>p.ativo).map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('')}</select>
        <input id="c_qtd" type="number" placeholder="Qtd" style="flex:1" min="1">
        <input id="c_cu" type="number" step="0.01" placeholder="R$ unit." style="flex:1">
      </div>
      <button class="btn soft sm" style="margin-top:8px;width:100%" onclick="addItemCompra()">＋ Adicionar item</button>
      <div id="c_lista" style="margin-top:8px"></div>
    </div>`,
    `<button class="btn" onclick="salvarCompra()">Registrar compra</button>`);
}
function addItemCompra(){
  const pid=$('#c_prod').value,q=+$('#c_qtd').value,cu=+$('#c_cu').value;
  if(!q||q<=0)return toast('Informe a quantidade','warn');
  compraItens.push({produtoId:pid,qtd:q,custoUnit:cu||prod(pid).custo});
  $('#c_qtd').value='';$('#c_cu').value='';renderItensCompra();
}
function renderItensCompra(){
  $('#c_lista').innerHTML=compraItens.map((i,ix)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line2);font-size:.86rem">
    <span><b>${esc(prod(i.produtoId).nome)}</b> · ${NUM(i.qtd)} × ${BRL(i.custoUnit)}</span>
    <span><b>${BRL(i.qtd*i.custoUnit)}</b> <button onclick="compraItens.splice(${ix},1);renderItensCompra()" style="color:var(--red);font-weight:700;padding:4px 8px">✕</button></span></div>`).join('')
    +(compraItens.length?`<div style="text-align:right;padding-top:8px"><b>Total: ${BRL(compraItens.reduce((s,i)=>s+i.qtd*i.custoUnit,0))}</b></div>`:'');
}
function salvarCompra(){
  const forn=$('#c_forn').value.trim();
  if(!forn)return toast('Informe o fornecedor','warn');
  if(!compraItens.length)return toast('Adicione ao menos um item','warn');
  const valor=compraItens.reduce((s,i)=>s+i.qtd*i.custoUnit,0);
  db.compras.push({id:uid(),fornecedor:forn,data:$('#c_data').value,nf:$('#c_nf').value.trim(),itens:compraItens,valor,responsavel:sessao.nome,updatedAt:now()});
  compraItens.forEach(i=>{const p=prod(i.produtoId);p.estoqueCentral+=i.qtd;if(i.custoUnit)p.custo=i.custoUnit;p.updatedAt=now()});
  audit('compra.lancar',`${forn} · ${BRL(valor)}`);
  salvar();fecharModal();toast('Compra registrada e estoque atualizado','ok');navegar('compras');
}
</script>

TELAS.jogos={titulo:'Jogos',
  render(){
    const ativo=jogoAtivo();
    return `<div class="page-head"><div><h2>Planejamento de jogos</h2><p>Cadastre a partida e gere a previsão de consumo</p></div>
      <button class="btn" onclick="formJogo()">＋ Novo jogo</button></div>
    ${db.jogos.length?[...db.jogos].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(j=>{
      const pub=(+j.publicoPrev.social||0)+(+j.publicoPrev.bangu||0)+(+j.publicoPrev.visitante||0);
      const s=statsJogo(j.id);
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">
          <div><b style="font-size:1.05rem">Bangu × ${esc(j.adversario)}</b>
            <div style="font-size:.78rem;color:var(--text2)">${esc(j.campeonato)} · ${dBR(j.data)} ${esc(j.hora||'')} · público previsto ${NUM(pub)}</div>
            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
              <span class="badge ${j.status==='em_andamento'?'b-green':j.status==='encerrado'?'b-gray':'b-blue'}">${j.status==='em_andamento'?'● Em andamento':j.status==='encerrado'?'Encerrado':'Planejado'}</span>
              ${j.status!=='planejado'?`<span class="badge b-red">${BRL(s.receita)}</span>`:''}
            </div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn ghost sm" onclick="sugestaoCompra('${j.id}')">🧠 Sugestão de compra</button>
            ${j.status==='planejado'?`<button class="btn sm" onclick="formJogo('${j.id}')">Editar</button>
              <button class="btn green sm" ${ativo?'disabled':''} onclick="iniciarJogo('${j.id}')">▶ Iniciar operação</button>`:''}
            ${j.status==='em_andamento'&&['admin','coord'].includes(sessao.perfil)?`<button class="btn sm" onclick="encerrarJogo('${j.id}')">⏹ Encerrar</button>`:''}
            ${j.status==='encerrado'?`<button class="btn ghost sm" onclick="relFechamento('${j.id}')">📄 Fechamento</button>`:''}
          </div></div></div>`}).join(''):'<div class="card"><div class="empty"><span class="ic">🏟️</span>Nenhum jogo cadastrado.<br><small>Comece cadastrando a próxima partida.</small></div></div>'}`;
  }
};
function formJogo(id){
  const j=id?db.jogos.find(x=>x.id===id):null;
  abrirModal(j?'Editar jogo':'Novo jogo',`
    <label>Adversário *</label><input id="j_adv" value="${esc(j?.adversario||'')}" placeholder="Ex.: Flamengo">
    <label>Campeonato *</label><input id="j_camp" value="${esc(j?.campeonato||'')}" placeholder="Ex.: Campeonato Carioca">
    <div class="grid2"><div><label>Data</label><input id="j_data" type="date" value="${j?.data||new Date().toISOString().slice(0,10)}"></div>
    <div><label>Horário</label><input id="j_hora" type="time" value="${j?.hora||'16:00'}"></div></div>
    <label style="margin-top:16px">Público previsto por setor</label>
    <div class="grid3">
      <div><label style="margin-top:0">🥂 Social</label><input id="j_ps" type="number" value="${j?.publicoPrev.social||''}" placeholder="0"></div>
      <div><label style="margin-top:0">🔴 Bangu</label><input id="j_pb" type="number" value="${j?.publicoPrev.bangu||''}" placeholder="0"></div>
      <div><label style="margin-top:0">🚌 Visitante</label><input id="j_pv" type="number" value="${j?.publicoPrev.visitante||''}" placeholder="0"></div>
    </div>`,
    `<button class="btn" onclick="salvarJogo('${j?j.id:''}')">Salvar jogo</button>`);
}
function salvarJogo(id){
  const adv=$('#j_adv').value.trim(),camp=$('#j_camp').value.trim();
  if(!adv||!camp)return toast('Preencha adversário e campeonato','warn');
  const dados={adversario:adv,campeonato:camp,data:$('#j_data').value,hora:$('#j_hora').value,
    publicoPrev:{social:+$('#j_ps').value||0,bangu:+$('#j_pb').value||0,visitante:+$('#j_pv').value||0},updatedAt:now()};
  if(id){Object.assign(db.jogos.find(x=>x.id===id),dados);audit('jogo.editar',adv)}
  else{db.jogos.push({id:'j-'+uid(),status:'planejado',...dados});audit('jogo.criar',adv)}
  salvar();fecharModal();toast('Jogo salvo','ok');navegar('jogos');
}
function iniciarJogo(id){
  if(jogoAtivo())return toast('Já existe um jogo em andamento','warn');
  const j=db.jogos.find(x=>x.id===id);j.status='em_andamento';j.updatedAt=now();
  audit('jogo.iniciar',j.adversario);salvar();toast('Operação iniciada! Bom jogo 🔴⚪','ok');navegar('jogos');
}
function encerrarJogo(id){
  const j=db.jogos.find(x=>x.id===id);
  const pend=db.reposicoes.filter(r=>r.jogoId===id&&['solicitada','aprovada'].includes(r.status)).length;
  const caixasAbertos=db.caixas.filter(c=>c.jogoId===id&&!c.fechado).length;
  abrirModal('Encerrar operação',`
    <p>Encerrar a operação do jogo <b>Bangu × ${esc(j.adversario)}</b>?</p>
    ${pend?`<p style="color:var(--amber);margin-top:8px">⚠️ ${pend} reposição(ões) pendente(s).</p>`:''}
    ${caixasAbertos?`<p style="color:var(--amber);margin-top:4px">⚠️ ${caixasAbertos} caixa(s) ainda aberto(s).</p>`:''}
    <p style="color:var(--text2);font-size:.85rem;margin-top:10px">Após encerrar, registre as devoluções de cada bar para atualizar o estoque central.</p>
    ${sigHTML()}`,
    `<button class="btn ghost" onclick="fecharModal()">Cancelar</button><button class="btn" onclick="confirmarEncerramento('${id}')">Encerrar operação</button>`);
  SigPad.montar('sigCanvas');
}
function confirmarEncerramento(id){
  const ass=SigPad.dataURL();
  if(!ass)return toast('Assinatura obrigatória para encerrar','warn');
  const j=db.jogos.find(x=>x.id===id);j.status='encerrado';j.assinaturaEncerramento=ass;j.encerradoPor=sessao.nome;j.encerradoEm=now();j.updatedAt=now();
  audit('jogo.encerrar',j.adversario);salvar();fecharModal();toast('Operação encerrada','ok');navegar('jogos');
}

/* sugestão automática de compra baseada no histórico */
function sugestaoCompra(jogoId){
  const j=db.jogos.find(x=>x.id===jogoId);
  const pub=(+j.publicoPrev.social||0)+(+j.publicoPrev.bangu||0)+(+j.publicoPrev.visitante||0)||1;
  const encerrados=db.jogos.filter(x=>x.status==='encerrado');
  const pubHist=encerrados.reduce((s,x)=>s+((+x.publicoPrev.social||0)+(+x.publicoPrev.bangu||0)+(+x.publicoPrev.visitante||0)),0);
  /* consumo per capita por produto no histórico; sem histórico → padrão por categoria (por 100 torcedores) */
  const padrao={'Água':18,'Refrigerante':22,'Guaracamp':15,'Cerveja':38,'Salgados':20,'Pipoca':12,'Amendoim':8,'Batata':9,'Torresmo':7,'Bolo (consignado)':5,'Outros':4};
  const linhas=db.produtos.filter(p=>p.ativo).map(p=>{
    let percap=null;
    if(pubHist>0){
      const vendHist=db.vendas.filter(v=>encerrados.some(e=>e.id===v.jogoId)).reduce((s,v)=>s+v.itens.filter(i=>i.produtoId===p.id).reduce((c,i)=>c+i.qtd,0),0);
      if(vendHist>0)percap=vendHist/pubHist;
    }
    const base=percap!==null?percap*pub:(padrao[p.categoria]||5)/100*pub;
    const sugerido=Math.ceil(base*1.10); // margem de segurança de 10%
    const comprar=Math.max(0,sugerido-p.estoqueCentral);
    return {p,sugerido,comprar,fonte:percap!==null?'histórico':'padrão'};
  }).filter(l=>l.sugerido>0);
  abrirModal('🧠 Sugestão de compra · '+esc(j.adversario),`
    <p style="color:var(--text2);font-size:.85rem">Base: ${NUM(pub)} torcedores previstos · ${pubHist>0?'consumo médio dos jogos anteriores':'tabela padrão de consumo'} · +10% de segurança.</p>
    <div class="table-wrap" style="margin-top:10px"><table><thead><tr><th>Produto</th><th class="num">Necessário</th><th class="num">Em estoque</th><th class="num">Comprar</th></tr></thead><tbody>
    ${linhas.map(l=>`<tr><td>${esc(l.p.nome)} <span class="badge ${l.fonte==='histórico'?'b-blue':'b-gray'}" style="font-size:.6rem">${l.fonte}</span></td>
      <td class="num">${NUM(l.sugerido)}</td><td class="num">${NUM(l.p.estoqueCentral)}</td>
      <td class="num"><b style="color:${l.comprar>0?'var(--red)':'var(--green)'}">${l.comprar>0?NUM(l.comprar):'✓ ok'}</b></td></tr>`).join('')}
    </tbody></table></div>`,
    `<button class="btn ghost" onclick="exportSugestaoCSV('${jogoId}')">⬇ Excel</button><button class="btn" onclick="fecharModal()">Fechar</button>`);
  window._sug={jogo:j,linhas};
}
function exportSugestaoCSV(){
  const {jogo,linhas}=window._sug;
  baixarCSV(`sugestao_compra_${jogo.adversario}.csv`,[['Produto','Necessario','EmEstoque','Comprar'],...linhas.map(l=>[l.p.nome,l.sugerido,l.p.estoqueCentral,l.comprar])]);
}

let romItens=[];
function gerarRomaneio(bar){
  const j=jogoAtivo();
  /* pré-preenche com sugestão proporcional ao setor */
  const pubSetor=+j.publicoPrev[bar]||0;
  const pubTotal=(+j.publicoPrev.social||0)+(+j.publicoPrev.bangu||0)+(+j.publicoPrev.visitante||0)||1;
  romItens=db.produtos.filter(p=>p.ativo&&p.estoqueCentral>0).map(p=>{
    const sug=Math.min(p.estoqueCentral,Math.ceil(p.estoqueCentral*(pubSetor/pubTotal)));
    return {produtoId:p.id,qtd:sug};
  });
  abrirModal(`Gerar carga · ${BARES[bar].nome}`,`
    <p style="color:var(--text2);font-size:.85rem">Quantidades pré-calculadas pela proporção de público do setor (${NUM(pubSetor)} de ${NUM(pubTotal)}). Ajuste antes de enviar.</p>
    <div class="table-wrap" style="margin-top:10px"><table><thead><tr><th>Produto</th><th class="num">Estoque</th><th style="width:110px">Enviar</th></tr></thead><tbody>
    ${romItens.map((i,ix)=>{const p=prod(i.produtoId);return `<tr><td>${esc(p.nome)}</td><td class="num">${NUM(p.estoqueCentral)}</td>
      <td><input type="number" id="rom_${ix}" value="${i.qtd}" min="0" max="${p.estoqueCentral}" style="padding:8px;text-align:center"></td></tr>`}).join('')}
    </tbody></table></div>
    ${sigHTML()}`,
    `<button class="btn" onclick="salvarRomaneio('${bar}')">🚚 Enviar carga</button>`);
  SigPad.montar('sigCanvas');
}
function salvarRomaneio(bar){
  const ass=SigPad.dataURL();
  if(!ass)return toast('Assine para confirmar o envio','warn');
  const j=jogoAtivo();
  const itens=romItens.map((i,ix)=>({produtoId:i.produtoId,qtdEnviada:+$('#rom_'+ix).value||0,qtdRecebida:0})).filter(i=>i.qtdEnviada>0);
  if(!itens.length)return toast('Nenhuma quantidade informada','warn');
  for(const i of itens){const p=prod(i.produtoId);if(i.qtdEnviada>p.estoqueCentral)return toast(`Estoque insuficiente de ${p.nome}`,'err')}
  itens.forEach(i=>{const p=prod(i.produtoId);p.estoqueCentral-=i.qtdEnviada;p.updatedAt=now()});
  db.romaneios.push({id:'r-'+uid(),jogoId:j.id,bar,itens,status:'enviado',assinaturaEnvio:ass,assinaturaRecebimento:null,
    dataHora:now(),responsavelEnvio:sessao.nome,responsavelRecebimento:null,updatedAt:now()});
  audit('romaneio.enviar',`${BARES[bar].nome} · ${itens.length} itens`);
  salvar();fecharModal();toast('Carga enviada para '+BARES[bar].nome,'ok');navegar('romaneio');
}
function receberRomaneio(id){
  const r=db.romaneios.find(x=>x.id===id);
  abrirModal(`Receber carga · ${BARES[r.bar].nome}`,`
    <p style="color:var(--text2);font-size:.85rem">Confira a mercadoria e confirme as quantidades recebidas.</p>
    <div class="table-wrap" style="margin-top:10px"><table><thead><tr><th>Produto</th><th class="num">Enviado</th><th style="width:110px">Recebido</th></tr></thead><tbody>
    ${r.itens.map((i,ix)=>`<tr><td>${esc(prod(i.produtoId)?.nome||'?')}</td><td class="num">${NUM(i.qtdEnviada)}</td>
      <td><input type="number" id="rec_${ix}" value="${i.qtdEnviada}" min="0" style="padding:8px;text-align:center"></td></tr>`).join('')}
    </tbody></table></div>
    ${sigHTML()}`,
    `<button class="btn green" onclick="confirmarRecebimento('${id}')">✓ Confirmar recebimento</button>`);
  SigPad.montar('sigCanvas');
}
function confirmarRecebimento(id){
  const ass=SigPad.dataURL();
  if(!ass)return toast('Assine para confirmar o recebimento','warn');
  const r=db.romaneios.find(x=>x.id===id);
  r.itens.forEach((i,ix)=>{
    i.qtdRecebida=+$('#rec_'+ix).value||0;
    const dif=i.qtdEnviada-i.qtdRecebida;
    if(dif>0){const p=prod(i.produtoId);p.estoqueCentral+=dif;p.updatedAt=now()} /* divergência volta ao central */
  });
  r.status='recebido';r.assinaturaRecebimento=ass;r.responsavelRecebimento=sessao.nome;r.updatedAt=now();
  audit('romaneio.receber',`${BARES[r.bar].nome}`);
  salvar();fecharModal();toast('Carga recebida no '+BARES[r.bar].nome,'ok');navegar('romaneio');
}

function negarReposicao(id){

    <label>Quem recebeu no bar *</label><input id="en_rec" placeholder="Nome de quem recebeu">

function confirmarEntregaRep(id){

  if(!rec)return toast('Informe quem recebeu','warn');

  const r=db.reposicoes.find(x=>x.id===id);
  r.itens.forEach(i=>{const p=prod(i.produtoId);p.estoqueCentral-=i.qtd;p.updatedAt=now()});
  r.status='entregue';r.entregador=$('#en_ent').value.trim()||sessao.nome;r.recebedor=rec;r.assinaturaRecebimento=ass;r.horaEntrega=now();r.updatedAt=now();
  audit('reposicao.entregar',`${BARES[r.bar].nome} ← ${r.itens.length} itens`);
  salvar();fecharModal();toast('Reposição entregue','ok');navegar('reposicao');
}

let carrinho={},pgtoSel='pix',pdvBar=null,pdvBusca='';
TELAS.pdv={titulo:'Vender',

    if(!j)return `<div class="card"><div class="empty"><span class="ic">🛒</span>As vendas só acontecem com um jogo em andamento.<br><small>Peça ao coordenador para iniciar a operação.</small></div></div>`;

    const nItens=Object.values(carrinho).reduce((s,q)=>s+q,0);

const pdvFiltrar=debounce(v=>{pdvBusca=v;navegar('pdv');const n=$('#pdvBusca');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length)}},300);

  cod=cod.trim();if(!cod)return;
  const p=db.produtos.find(x=>x.ativo&&(x.barras===cod||x.codigo.toLowerCase()===cod.toLowerCase()));

function addCarrinho(pid){
  const j=jogoAtivo();const e=estoqueBar(pdvBar,j.id);

function fecharCaixa(cxId){

  const j=jogoAtivo();

function formDevolucao(bar,jogoId){
  const e=estoqueBar(bar,jogoId);
  const itens=db.produtos.filter(p=>p.ativo&&(e[p.id]||0)>0);
  abrirModal('Devolução · '+BARES[bar].nome,`
    <p style="color:var(--text2);font-size:.85rem">Informe o que volta ao estoque central e o que foi perdido/danificado.</p>
    <div class="table-wrap" style="margin-top:10px"><table><thead><tr><th>Produto</th><th class="num">No bar</th><th style="width:84px">Devolve</th><th style="width:84px">Perdido</th><th style="width:84px">Danif.</th></tr></thead><tbody>
    ${itens.map((p,ix)=>`<tr><td style="font-size:.82rem">${esc(p.nome)}</td><td class="num">${NUM(e[p.id])}</td>
      <td><input type="number" id="dv_d${ix}" value="${e[p.id]}" min="0" style="padding:7px;text-align:center"></td>
      <td><input type="number" id="dv_p${ix}" value="0" min="0" style="padding:7px;text-align:center"></td>
      <td><input type="number" id="dv_x${ix}" value="0" min="0" style="padding:7px;text-align:center"></td></tr>`).join('')}
    </tbody></table></div>
    <label>Motivo de perdas/danos</label><input id="dv_mot" placeholder="Ex.: latas amassadas, produto vencido…">
    ${sigHTML()}`,
    `<button class="btn" onclick="salvarDevolucao('${bar}','${jogoId}')">✓ Confirmar devolução</button>`);
  window._devItens=itens;
  SigPad.montar('sigCanvas');
}
function salvarDevolucao(bar,jogoId){
  const ass=SigPad.dataURL();
  if(!ass)return toast('Assinatura obrigatória','warn');
  const e=estoqueBar(bar,jogoId);
  const itens=[];let erro=null;
  window._devItens.forEach((p,ix)=>{
    const dv=+$('#dv_d'+ix).value||0,pd=+$('#dv_p'+ix).value||0,dn=+$('#dv_x'+ix).value||0;
    if(dv+pd+dn>(e[p.id]||0))erro=p.nome;
    if(dv||pd||dn)itens.push({produtoId:p.id,qtdDevolvida:dv,qtdPerdida:pd,qtdDanificada:dn,motivo:$('#dv_mot').value.trim()});
  });
  if(erro)return toast('Quantidades maiores que o disponível: '+erro,'err');
  if(!itens.length)return toast('Nada informado','warn');
  itens.forEach(i=>{const p=prod(i.produtoId);p.estoqueCentral+=i.qtdDevolvida;p.updatedAt=now()});
  db.devolucoes.push({id:'d-'+uid(),jogoId,bar,itens,responsavel:sessao.nome,assinatura:ass,dataHora:now(),updatedAt:now()});
  audit('devolucao',`${BARES[bar].nome} · ${itens.length} itens`);
  salvar();fecharModal();toast('Devolução registrada — estoque central atualizado','ok');navegar('devolucao');
}

      <div class="card"><h3>💰 Receita por jogo</h3>
        ${porJogo.length?porJogo.map(({j,s:sj})=>`<div class="hbar-row"><div class="nm">${esc(j.adversario)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(4,sj.receita/maxJ*100)}%"></div></div><div class="vl">${BRL(sj.receita)}</div></div>`).join(''):'<div class="empty">Sem dados</div>'}

      </div>

/* =====================================================
   SINCRONIZAÇÃO NA NUVEM (Supabase REST)
   Estratégia: cada registro é uma linha (id, tipo, dados,
   updated_at). Mescla por updatedAt — o mais recente vence.
   ===================================================== */
const COLECOES=['usuarios','produtos','compras','jogos','romaneios','reposicoes','vendas','caixas','devolucoes','ajustes','excluidos'];
const Sync={
  status:'',ocupado:false,
  configurado(){return !!(db.config.supabaseUrl&&db.config.supabaseKey)},
  headers(){return {'apikey':db.config.supabaseKey,'Authorization':'Bearer '+db.config.supabaseKey,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'}},
  async sincronizar(silencioso){
    if(!this.configurado()){if(!silencioso)toast('Configure a nuvem em Ajustes ⚙️','warn');return}
    if(this.ocupado)return;this.ocupado=true;
    const dot=$('#syncDot');if(dot)dot.className='sync-dot';
    try{
      const base=db.config.supabaseUrl+'/rest/v1/bangu_registros';
      /* 1. envia registros locais */
      const locais=[];
      COLECOES.forEach(col=>{(db[col]||[]).forEach(r=>{
        const upd=r.updatedAt||r.quando||now();
        locais.push({id:col+'::'+(r.id||uid()),tipo:col,dados:r,updated_at:upd});
      })});
      for(let i=0;i<locais.length;i+=200){
        const res=await fetch(base+'?on_conflict=id',{method:'POST',headers:this.headers(),body:JSON.stringify(locais.slice(i,i+200))});
        if(!res.ok)throw new Error('envio '+res.status);
      }
      /* 2. baixa tudo e mescla */
      const res=await fetch(base+'?select=id,tipo,dados,updated_at&limit=20000',{headers:this.headers()});
      if(!res.ok)throw new Error('leitura '+res.status);
      const remotos=await res.json();
      const apagados=new Set((db.excluidos||[]).map(x=>x.tipo+'::'+x.id));
      let novos=0;
      remotos.forEach(rr=>{
        const col=rr.tipo;if(!COLECOES.includes(col)||col==='excluidos')return;
        if(apagados.has(rr.id))return;
        const arr=db[col];const dados=rr.dados;
        const ix=arr.findIndex(x=>x.id===dados.id);
        if(ix<0){arr.push(dados);novos++}
        else if((dados.updatedAt||'')>(arr[ix].updatedAt||'')){arr[ix]=dados;novos++}
      });
      /* aplica exclusões vindas de outros aparelhos */
      remotos.filter(r=>r.tipo==='excluidos').forEach(rr=>{
        const d=rr.dados;if(!db.excluidos.some(x=>x.id===d.id&&x.tipo===d.tipo))db.excluidos.push(d);
        db[d.tipo]=(db[d.tipo]||[]).filter(x=>x.id!==d.id);
      });
      db.config.ultimaSync=now();this.status='on';salvar();
      if(dot)dot.className='sync-dot on';
      if(!silencioso){toast('☁️ Sincronizado ✓','ok');navegar(rota,rotaParams)}
    }catch(e){
      this.status='err';const dot2=$('#syncDot');if(dot2)dot2.className='sync-dot err';
      if(!silencioso)toast('Falha ao sincronizar: '+e.message+'. Os dados continuam salvos no aparelho.','err');
    }finally{this.ocupado=false}
  }
};
